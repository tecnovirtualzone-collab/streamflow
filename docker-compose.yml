version: "3.8"

services:
  streamflow:
    image: ${STREAMFLOW_IMAGE:-easypanel/luna/streamflow:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-streamflow}_app
    restart: unless-stopped
    ports:
      - "${STREAMFLOW_PORT:-5000}:5000"
    environment:
      # ── Base de datos ──
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-streamflow}

      # ── Seguridad ──
      - SECRET_KEY=${SECRET_KEY:-change-this-to-random-string}
      - JWT_SECRET=${JWT_SECRET:-change-this-to-another-random-string}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}

      # ── Admin panel ──
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}

      # ── Proveedor IPTV (URL M3U completa con credenciales) ──
      - URL_M3U=${URL_M3U:-}

      # ── VLC Relay ──
      - VLC_HTTP_PORT=${VLC_HTTP_PORT:-8888}
      - VLC_HTTP_USER=${VLC_HTTP_USER:-streamflow}
      - VLC_HTTP_PASS=${VLC_HTTP_PASS:-changeme}
      - VLC_TIMEOUT=${VLC_TIMEOUT:-60}
      - VLC_MAX_CHANNELS=${VLC_MAX_CHANNELS:-8}

      # ── Smart Relay ──
      - SMART_MAX_CONNECTIONS=${SMART_MAX_CONNECTIONS:-3}
      - SMART_ROTATION_INTERVAL=${SMART_ROTATION_INTERVAL:-30}
      - SMART_BUFFER_SECONDS=${SMART_BUFFER_SECONDS:-10}

      # ── CORS ──
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}

      # ── Listas gratuitas (separadas por coma) ──
      - FREE_M3U_LISTS=${FREE_M3U_LISTS:-https://iptv-org.github.io/iptv/index.m3u8}

    depends_on:
      db:
        condition: service_healthy
    networks:
      - streamflow_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: ${POSTGRES_IMAGE:-postgres:17}
    container_name: ${COMPOSE_PROJECT_NAME:-streamflow}_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-streamflow}
    volumes:
      - streamflow_pgdata:/var/lib/postgresql/data
    networks:
      - streamflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-streamflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  streamflow_pgdata:

networks:
  streamflow_net:
    driver: bridge
