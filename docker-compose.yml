version: "3.8"

services:
  streamflow:
    build: .
    image: streamflow:latest
    container_name: streamflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATA_DIR=/data
      - JWT_SECRET=${JWT_SECRET:-streamflow-secret-change-me}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-10}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-admin123}
      - STREAM_MAX_CONCURRENT=${STREAM_MAX_CONCURRENT:-3}
      - STREAM_INACTIVITY_TIMEOUT_MS=${STREAM_INACTIVITY_TIMEOUT_MS:-120000}
      - TZ=${TZ:-America/Bogota}
      - NODE_ENV=production
    volumes:
      - streamflow_v5_data:/data
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  streamflow_v5_data:
