<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StreamFlow">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/tv/manifest.json">
<link rel="apple-touch-icon" href="/tv/icon-192.png">
<title>StreamFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: #2a2a3a;
  --accent: #e50914;
  --accent2: #ff6b35;
  --text: #ffffff;
  --muted: #8888aa;
  --green: #46d369;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif}
input,button{font-family:'Outfit',sans-serif}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column}
.screen.active{display:flex}

/* ── LOGIN ── */
#screen-login{align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%, #1a0a1a 0%, #0a0a0f 60%)}
.login-card{width:100%;max-width:400px;padding:48px 40px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:24px;backdrop-filter:blur(20px)}
.login-logo{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.login-logo span{color:var(--accent)}
.login-sub{color:var(--muted);font-size:14px;margin-bottom:36px}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.login-field input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:14px 16px;border-radius:12px;font-size:16px;outline:none;transition:border .2s}
.login-field input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .2s}
.login-btn:hover{background:#c40812}
.login-btn:active{transform:scale(.98)}
.login-error{color:#ff6b6b;font-size:13px;margin-top:12px;text-align:center;display:none}

/* ── MAIN APP ── */
#screen-app{flex-direction:row}

/* ── SIDEBAR ── */
.sidebar{width:72px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:8px;z-index:10;transition:width .3s ease;overflow:hidden}
.sidebar:hover{width:200px}
.sidebar-logo{font-size:18px;font-weight:800;color:var(--accent);margin-bottom:16px;padding:0 20px;white-space:nowrap;overflow:hidden}
.sidebar-logo span{color:var(--text)}
.nav-btn{width:100%;display:flex;align-items:center;gap:14px;padding:12px 20px;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:0;transition:all .2s;font-size:14px;font-weight:500;white-space:nowrap}
.nav-btn:hover,.nav-btn.active{background:rgba(229,9,20,.1);color:var(--text)}
.nav-btn.active{border-left:3px solid var(--accent)}
.nav-icon{font-size:20px;min-width:32px;text-align:center}
.nav-label{opacity:0;transition:opacity .2s .1s}
.sidebar:hover .nav-label{opacity:1}

/* ── CONTENT AREA ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;height:100vh}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── PAGES ── */
.page{display:none;padding:24px;min-height:100vh}
.page.active{display:block}

/* ── SEARCH BAR ── */
.top-bar{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding:0 4px}
.search-wrap{flex:1;max-width:400px;position:relative}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 16px 10px 40px;border-radius:10px;font-size:14px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.user-badge{background:var(--surface2);border:1px solid var(--border);padding:8px 14px;border-radius:10px;font-size:13px;color:var(--muted)}
.user-badge strong{color:var(--text)}

/* ── CATEGORY TABS ── */
.cat-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Outfit',sans-serif}
.cat-tab:hover{border-color:var(--text);color:var(--text)}
.cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── CHANNEL GRID ── */
.channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.ch-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.ch-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(229,9,20,.2)}
.ch-card.playing{border-color:var(--green)}
.ch-card.playing::before{content:'● EN VIVO';position:absolute;top:8px;right:8px;background:var(--green);color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px}
.ch-logo{width:48px;height:48px;border-radius:8px;object-fit:contain;background:var(--border)}
.ch-logo-placeholder{width:48px;height:48px;border-radius:8px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:20px}
.ch-name{font-size:13px;font-weight:600;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.ch-cat{font-size:11px;color:var(--muted)}

/* ── PLAYER ── */
#screen-player{background:#000;flex-direction:column}
.player-wrap{flex:1;position:relative;background:#000}
#video-el{width:100%;height:100%;object-fit:contain}
.player-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;opacity:0;transition:opacity .3s;background:linear-gradient(to bottom, rgba(0,0,0,.7) 0%, transparent 30%, transparent 70%, rgba(0,0,0,.8) 100%)}
.player-overlay.show{opacity:1}
.player-top{padding:20px 24px;display:flex;align-items:center;gap:16px}
.player-back{background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.player-title{font-size:18px;font-weight:600}
.player-cat{font-size:13px;color:rgba(255,255,255,.7)}
.player-live{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.player-bottom{padding:20px 24px}
.player-controls{display:flex;align-items:center;gap:16px}
.ctrl-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all .2s}
.ctrl-btn:hover{background:rgba(255,255,255,.3)}
.vol-wrap{display:flex;align-items:center;gap:8px;flex:1;max-width:160px}
.vol-wrap input{flex:1;accent-color:var(--accent)}
.player-channels{width:280px;background:rgba(10,10,15,.95);border-left:1px solid var(--border);overflow-y:auto;display:none}
.player-channels.show{display:flex;flex-direction:column}
.pch-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .2s}
.pch-item:hover{background:var(--surface2)}
.pch-item.active{background:rgba(229,9,20,.15);border-left:3px solid var(--accent)}
.pch-num{font-size:11px;color:var(--muted);min-width:28px}
.pch-name{font-size:13px;font-weight:500}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{width:0;position:fixed;z-index:100;transform:translateX(-100%)}
  .sidebar.mobile-open{width:200px;transform:translateX(0)}
  .content{margin-left:0}
  .channels-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
  .page{padding:16px}
  .player-channels{display:none!important}
}
@media(max-width:480px){
  .channels-grid{grid-template-columns:repeat(2,1fr)}
  .login-card{padding:32px 24px;margin:16px}
}

/* ── TV MODE (large screens) ── */
@media(min-width:1400px){
  .channels-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
  .ch-card{padding:18px}
  .ch-name{font-size:15px}
  .sidebar{width:80px}
  .sidebar:hover{width:220px}
}

/* ── PWA INSTALL BANNER ── */
.install-banner{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:14px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;max-width:360px;width:calc(100% - 40px)}
.install-banner.show{display:flex}
.install-text{flex:1;font-size:13px}
.install-text strong{display:block;margin-bottom:2px}
.install-text span{color:var(--muted);font-size:12px}
.install-btn{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif}
.install-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-card">
    <div class="login-logo">Stream<span>Flow</span></div>
    <div class="login-sub">Tu televisión en todos tus dispositivos</div>
    <div class="login-field">
      <label>Usuario</label>
      <input id="l-user" type="text" placeholder="Tu usuario" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>
  </div>
</div>

<!-- MAIN APP -->
<div class="screen" id="screen-app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">S<span>F</span></div>
    <button class="nav-btn active" onclick="showPage('live',this)" id="nav-live">
      <span class="nav-icon">📺</span><span class="nav-label">En vivo</span>
    </button>
    <button class="nav-btn" onclick="showPage('movies',this)" id="nav-movies">
      <span class="nav-icon">🎬</span><span class="nav-label">Películas</span>
    </button>
    <button class="nav-btn" onclick="showPage('series',this)" id="nav-series">
      <span class="nav-icon">📦</span><span class="nav-label">Series</span>
    </button>
    <div style="flex:1"></div>
    <button class="nav-btn" onclick="doLogout()">
      <span class="nav-icon">🚪</span><span class="nav-label">Salir</span>
    </button>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- LIVE TV -->
    <div class="page active" id="page-live">
      <div class="top-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Buscar canal..." id="search-live" oninput="filtrarCanales()">
        </div>
        <div class="user-badge">👤 <strong id="badge-user"></strong></div>
      </div>
      <div class="cat-tabs" id="cat-tabs"></div>
      <div id="channels-container">
        <div class="loading"><div class="spinner"></div><span style="color:var(--muted);font-size:14px">Cargando canales...</span></div>
      </div>
    </div>

    <!-- MOVIES -->
    <div class="page" id="page-movies">
      <div class="top-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Buscar película..." id="search-movies" oninput="filtrarPeliculas()">
        </div>
      </div>
      <div class="cat-tabs" id="movie-cat-tabs"></div>
      <div id="movies-container">
        <div class="loading"><div class="spinner"></div><span style="color:var(--muted);font-size:14px">Cargando películas...</span></div>
      </div>
    </div>

    <!-- SERIES -->
    <div class="page" id="page-series">
      <div class="top-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Buscar serie..." id="search-series" oninput="filtrarSeries()">
        </div>
      </div>
      <div class="cat-tabs" id="series-cat-tabs"></div>
      <div id="series-container">
        <div class="loading"><div class="spinner"></div><span style="color:var(--muted);font-size:14px">Cargando series...</span></div>
      </div>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div class="screen" id="screen-player">
  <div class="player-wrap" id="player-wrap" onclick="toggleOverlay()">
    <video id="video-el" autoplay playsinline></video>
    <div class="player-overlay" id="player-overlay">
      <div class="player-top">
        <button class="player-back" onclick="closePlayer(event)">←</button>
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="player-title" id="player-title">Canal</div>
            <div class="player-live" id="player-live-badge">EN VIVO</div>
          </div>
          <div class="player-cat" id="player-cat"></div>
        </div>
      </div>
      <div class="player-bottom">
        <div class="player-controls">
          <button class="ctrl-btn" onclick="togglePlay(event)" id="play-btn">⏸</button>
          <div class="vol-wrap">
            <span>🔊</span>
            <input type="range" min="0" max="1" step="0.1" value="1" oninput="setVol(this.value)" onclick="event.stopPropagation()">
          </div>
          <button class="ctrl-btn" onclick="toggleFullscreen(event)">⛶</button>
          <button class="ctrl-btn" onclick="toggleChannelList(event)" title="Lista de canales">☰</button>
        </div>
      </div>
    </div>
  </div>
  <div class="player-channels" id="player-channels">
    <div style="padding:16px;font-weight:600;font-size:14px;border-bottom:1px solid var(--border)">Canales</div>
    <div id="player-ch-list"></div>
  </div>
</div>

<!-- PWA Install Banner -->
<div class="install-banner" id="install-banner">
  <div style="font-size:28px">📺</div>
  <div class="install-text">
    <strong>Instalar StreamFlow</strong>
    <span>Agrega a tu pantalla de inicio</span>
  </div>
  <button class="install-btn" onclick="installPWA()">Instalar</button>
  <button class="install-close" onclick="document.getElementById('install-banner').classList.remove('show')">✕</button>
</div>

<script>
const API = window.location.origin;
let _user = '', _pass = '', _hls = null;
let _allChannels = [], _allMovies = [], _allSeries = [];
let _currentCat = 'Todos', _currentStream = null;
let _overlayTimer = null;
let _deferredInstall = null;

// ── PWA ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstall = e;
  setTimeout(() => document.getElementById('install-banner').classList.add('show'), 3000);
});
async function installPWA() {
  if (!_deferredInstall) return;
  _deferredInstall.prompt();
  const r = await _deferredInstall.userChoice;
  document.getElementById('install-banner').classList.remove('show');
}

// ── LOGIN ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('screen-login').classList.contains('active')) doLogin();
});

async function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  if (!u || !p) { err.textContent = 'Completa usuario y contraseña'; err.style.display = 'block'; return; }

  const btn = document.querySelector('.login-btn');
  btn.textContent = 'Conectando...'; btn.disabled = true;

  try {
    const r = await fetch(`${API}/player_api.php?username=${u}&password=${p}`);
    const d = await r.json();
    if (d.user_info?.auth === 1) {
      _user = u; _pass = p;
      localStorage.setItem('sf_user', u);
      localStorage.setItem('sf_pass', p);
      document.getElementById('badge-user').textContent = u;
      showScreen('app');
      cargarCanales();
    } else {
      err.textContent = 'Usuario o contraseña incorrectos';
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = 'Error de conexión. Intenta de nuevo.';
    err.style.display = 'block';
  }
  btn.textContent = 'Entrar'; btn.disabled = false;
}

function doLogout() {
  localStorage.removeItem('sf_user');
  localStorage.removeItem('sf_pass');
  _user = ''; _pass = '';
  showScreen('login');
}

// Auto login
const su = localStorage.getItem('sf_user'), sp = localStorage.getItem('sf_pass');
if (su && sp) {
  document.getElementById('l-user').value = su;
  document.getElementById('l-pass').value = sp;
  _user = su; _pass = sp;
  document.getElementById('badge-user').textContent = su;
  showScreen('app');
  cargarCanales();
}

// ── NAVIGATION ──
function showScreen(s) {
  document.querySelectorAll('.screen').forEach(x => x.classList.remove('active'));
  document.getElementById('screen-' + s).classList.add('active');
}

function showPage(p, btn) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  if (btn) btn.classList.add('active');
  if (p === 'movies' && !_allMovies.length) cargarPeliculas();
  if (p === 'series' && !_allSeries.length) cargarSeries();
}

// ── LIVE TV ──
async function cargarCanales() {
  try {
    const r = await fetch(`${API}/player_api.php?username=${_user}&password=${_pass}&action=get_live_streams`);
    const data = await r.json();
    _allChannels = data || [];

    // Categorías
    const cats = ['Todos', ...new Set(_allChannels.map(c => c.category_name || 'General').filter(Boolean))];
    const tabsEl = document.getElementById('cat-tabs');
    tabsEl.innerHTML = cats.slice(0, 30).map(c =>
      `<button class="cat-tab${c==='Todos'?' active':''}" onclick="selectCat('${c.replace(/'/g,"\\'")}',this)">${c}</button>`
    ).join('');

    renderCanales(_allChannels);

    // Lista en player
    const pchList = document.getElementById('player-ch-list');
    pchList.innerHTML = _allChannels.map((c,i) =>
      `<div class="pch-item" onclick="playChannel(${c.stream_id},'${escQ(c.name)}','${escQ(c.category_name||'')}','${escQ(c.stream_icon||'')}')" id="pch-${c.stream_id}">
        <span class="pch-num">${i+1}</span>
        <span class="pch-name">${c.name}</span>
      </div>`
    ).join('');
  } catch(e) {
    document.getElementById('channels-container').innerHTML = '<div class="empty"><div class="empty-icon">📡</div><p>Error al cargar canales</p></div>';
  }
}

function renderCanales(list) {
  const el = document.getElementById('channels-container');
  if (!list.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Sin resultados</p></div>'; return; }
  el.innerHTML = `<div class="channels-grid">${list.map(c => `
    <div class="ch-card${_currentStream===c.stream_id?' playing':''}" onclick="playChannel(${c.stream_id},'${escQ(c.name)}','${escQ(c.category_name||'')}','${escQ(c.stream_icon||'')}')">
      ${c.stream_icon ? `<img class="ch-logo" src="${c.stream_icon}" onerror="this.style.display='none'" loading="lazy">` : `<div class="ch-logo-placeholder">📺</div>`}
      <div class="ch-name">${c.name}</div>
      <div class="ch-cat">${c.category_name || ''}</div>
    </div>`).join('')}</div>`;
}

function selectCat(cat, btn) {
  _currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(x => x.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const q = document.getElementById('search-live').value.toLowerCase();
  const filtered = _allChannels.filter(c =>
    (cat === 'Todos' || c.category_name === cat) &&
    (!q || c.name.toLowerCase().includes(q))
  );
  renderCanales(filtered);
}

function filtrarCanales() {
  const q = document.getElementById('search-live').value.toLowerCase();
  const filtered = _allChannels.filter(c =>
    (_currentCat === 'Todos' || c.category_name === _currentCat) &&
    (!q || c.name.toLowerCase().includes(q))
  );
  renderCanales(filtered);
}

// ── MOVIES ──
async function cargarPeliculas() {
  try {
    const [rC, rS] = await Promise.all([
      fetch(`${API}/player_api.php?username=${_user}&password=${_pass}&action=get_vod_categories`),
      fetch(`${API}/player_api.php?username=${_user}&password=${_pass}&action=get_vod_streams`)
    ]);
    const cats = await rC.json();
    _allMovies = await rS.json() || [];

    if (!_allMovies.length) {
      document.getElementById('movies-container').innerHTML = '<div class="empty"><div class="empty-icon">🎬</div><p>Sin películas disponibles en tu paquete</p></div>';
      return;
    }

    const tabsEl = document.getElementById('movie-cat-tabs');
    tabsEl.innerHTML = ['Todos', ...(cats||[]).map(c=>c.category_name)].slice(0,20).map((c,i) =>
      `<button class="cat-tab${i===0?' active':''}" onclick="selectMovieCat('${escQ(c)}',this)">${c}</button>`
    ).join('');

    renderMovies(_allMovies.slice(0, 100));
  } catch(e) {
    document.getElementById('movies-container').innerHTML = '<div class="empty"><div class="empty-icon">🎬</div><p>Error al cargar películas</p></div>';
  }
}

function renderMovies(list) {
  const el = document.getElementById('movies-container');
  if (!list.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Sin resultados</p></div>'; return; }
  el.innerHTML = `<div class="channels-grid">${list.map(m => `
    <div class="ch-card" onclick="playVOD(${m.stream_id},'${escQ(m.name)}','${escQ(m.category_name||'')}','${escQ(m.stream_icon||'')}','movie')">
      ${m.stream_icon ? `<img class="ch-logo" src="${m.stream_icon}" onerror="this.style.display='none'" loading="lazy">` : `<div class="ch-logo-placeholder">🎬</div>`}
      <div class="ch-name">${m.name}</div>
      <div class="ch-cat">${m.category_name || ''}</div>
    </div>`).join('')}</div>`;
}

function selectMovieCat(cat, btn) {
  document.querySelectorAll('#movie-cat-tabs .cat-tab').forEach(x => x.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const q = document.getElementById('search-movies').value.toLowerCase();
  const filtered = _allMovies.filter(m =>
    (cat === 'Todos' || m.category_name === cat) &&
    (!q || m.name.toLowerCase().includes(q))
  ).slice(0, 100);
  renderMovies(filtered);
}

function filtrarPeliculas() {
  const q = document.getElementById('search-movies').value.toLowerCase();
  const filtered = _allMovies.filter(m => !q || m.name.toLowerCase().includes(q)).slice(0, 100);
  renderMovies(filtered);
}

// ── PLAYER ──
function playChannel(streamId, name, cat, icon) {
  _currentStream = streamId;
  const url = `${API}/live/${_user}/${_pass}/${streamId}.m3u8`;
  document.getElementById('player-title').textContent = name;
  document.getElementById('player-cat').textContent = cat;
  document.getElementById('player-live-badge').style.display = 'block';
  openPlayer(url);

  // Highlight en lista
  document.querySelectorAll('.pch-item').forEach(x => x.classList.remove('active'));
  const pch = document.getElementById('pch-' + streamId);
  if (pch) { pch.classList.add('active'); pch.scrollIntoView({block:'nearest'}); }
}

function playVOD(streamId, name, cat, icon, type) {
  const ext = type === 'movie' ? 'mp4' : '';
  const url = `${API}/${type}/${_user}/${_pass}/${streamId}${ext ? '.'+ext : ''}`;
  document.getElementById('player-title').textContent = name;
  document.getElementById('player-cat').textContent = cat;
  document.getElementById('player-live-badge').style.display = 'none';
  openPlayer(url);
}

function openPlayer(url) {
  showScreen('player');
  const video = document.getElementById('video-el');

  if (_hls) { _hls.destroy(); _hls = null; }

  if (Hls.isSupported()) {
    _hls = new Hls({ enableWorker: true, lowLatencyMode: true });
    _hls.loadSource(url);
    _hls.attachMedia(video);
    _hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play().catch(()=>{});
  } else {
    video.src = url;
    video.play().catch(()=>{});
  }

  showOverlay();
}

function closePlayer(e) {
  if (e) e.stopPropagation();
  if (_hls) { _hls.destroy(); _hls = null; }
  document.getElementById('video-el').src = '';
  showScreen('app');
}

function togglePlay(e) {
  if (e) e.stopPropagation();
  const v = document.getElementById('video-el');
  if (v.paused) { v.play(); document.getElementById('play-btn').textContent = '⏸'; }
  else { v.pause(); document.getElementById('play-btn').textContent = '▶'; }
}

function setVol(v) { document.getElementById('video-el').volume = v; }

function toggleFullscreen(e) {
  if (e) e.stopPropagation();
  const el = document.getElementById('player-wrap');
  if (document.fullscreenElement) document.exitFullscreen();
  else el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
}

function toggleChannelList(e) {
  if (e) e.stopPropagation();
  document.getElementById('player-channels').classList.toggle('show');
}

function showOverlay() {
  const ov = document.getElementById('player-overlay');
  ov.classList.add('show');
  clearTimeout(_overlayTimer);
  _overlayTimer = setTimeout(() => ov.classList.remove('show'), 3000);
}

function toggleOverlay() {
  const ov = document.getElementById('player-overlay');
  if (ov.classList.contains('show')) {
    ov.classList.remove('show');
    clearTimeout(_overlayTimer);
  } else {
    showOverlay();
  }
}

// ── TV KEYBOARD NAVIGATION ──
document.addEventListener('keydown', e => {
  if (document.getElementById('screen-player').classList.contains('active')) {
    if (e.key === 'Escape' || e.key === 'Backspace') closePlayer();
    if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') showOverlay();
  }
});

// ── UTILS ──
function escQ(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'\\"'); }
